services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.16
    container_name: sonarr
    environment:
      - TZ=Europe/Berlin
    volumes:
      - config:/config
      - /mnt/seedbox/media/TV Shows:/home/etron/media/TV Shows
      - /mnt/seedbox/downloads:/home/etron/downloads
    restart: unless-stopped

volumes:
  config: