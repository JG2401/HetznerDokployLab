version: "3.8"
services:
  jellyfin:
    image: jellyfin/jellyfin:10
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    volumes:
      - config:/config
      - cache:/cache
      - /mnt/seedbox/media:/media
    restart: "unless-stopped"
    environment:
      - JELLYFIN_PublishedServerUrl=https://${JELLYFIN_HOST}
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  config:
  cache:
  media:
